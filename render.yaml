services:
  # Frontend - Static Site
  - type: static
    name: cbu-finance-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: frontend/dist
    # Root directory where package.json is located
    rootDirectory: frontend
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_TELEGRAM_BOT_TOKEN
        sync: false
    routes:
      # Rewrites all requests to index.html for SPA routing
      - type: rewrite
        source: /*
        destination: /index.html
