services:
  # Frontend - Static Site
  - type: web
    name: cbu-finance-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_TELEGRAM_BOT_TOKEN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend - FastAPI Web Service
  - type: web
    name: cbu-finance-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./sql_app.db
