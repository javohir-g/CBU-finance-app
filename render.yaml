databases:
  - name: cbu-finance-db
    databaseName: cbu_finance
    user: cbu_finance_user
    plan: free

staticSites:
  - name: cbu-finance-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_TELEGRAM_BOT_TOKEN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

services:
  - type: web
    name: cbu-finance-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cbu-finance-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: WEBAPP_URL
        sync: false
