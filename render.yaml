services:
  # Frontend - Static Site
  - type: static_site
    name: cbu-finance-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: frontend/dist
    # Root directory where package.json is located
    rootDirectory: frontend
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_TELEGRAM_BOT_TOKEN
        sync: false
    routes:
      # Rewrites all requests to index.html for SPA routing
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend - FastAPI Web Service
  - type: web
    name: cbu-finance-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    # Root directory where requirements.txt is located
    rootDirectory: .
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./sql_app.db # Default for MVP
